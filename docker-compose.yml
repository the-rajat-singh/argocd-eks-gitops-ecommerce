version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       reasonablestore
      POSTGRES_USER:     storeuser
      POSTGRES_PASSWORD: storepassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeuser -d reasonablestore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rs-network

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rs-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     development
      PORT:         5000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      reasonablestore
      DB_USER:      storeuser
      DB_PASSWORD:  storepassword
      SMTP_HOST:    smtp.gmail.com
      SMTP_PORT:    587
      SMTP_USER:    ""         # your Gmail
      SMTP_PASS:    ""         # your App Password
      STORE_EMAIL:  ""         # owner email
      API_BASE_URL: http://localhost:5000
    volumes:
      - uploads_data:/app/uploads
      - ./backend/src:/app/src   # hot-reload in dev
    ports:
      - "5000:5000"
    networks:
      - rs-network

  # ── Frontend React ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rs-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - rs-network

volumes:
  postgres_data:
  uploads_data:

networks:
  rs-network:
    driver: bridge
