# ============================================================
# Ingress – works with AWS ELB hostname OR a custom domain
# ============================================================
# No host: field = matches ALL hostnames (ELB URL, IP, custom domain).
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reasonable-store-ingress
  namespace: reasonable-store
  annotations:
    # IMPORTANT: No rewrite-target here — it breaks the React SPA
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    # No host: field → matches ELB URL, IP, and any custom domain
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
