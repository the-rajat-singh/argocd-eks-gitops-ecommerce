apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reasonable-store-ingress
  namespace: reasonable-store
  annotations:
    # IMPORTANT: No rewrite-target here — it breaks the React SPA
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Enables cert-manager
spec:
  ingressClassName: nginx
  tls:  # Add this section for SSL
  - hosts:
    - churu.online  # Replace with your actual domain
    secretName: reasonable-store-tls  # Cert-manager will create this secret
  rules:
  - host: churu.online  # Specify the host (required for SSL)
    http:
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: backend-service
              port:
                number: 5000
        
        - path: /uploads
          pathType: Prefix
          backend:
            service:
              name: backend-service
              port:
                number: 5000

       
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend-service
              port:
                number: 80