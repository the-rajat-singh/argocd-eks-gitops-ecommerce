# Requires nginx-ingress-controller installed in cluster
# Install: helm install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reasonable-store-ingress
  namespace: reasonable-store
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"   # uncomment for HTTPS
spec:
  ingressClassName: nginx
  # tls:                                                    # uncomment for HTTPS
  # - hosts:
  #   - reasonablestore.yourdomain.com
  #   secretName: reasonable-store-tls
  rules:
    - host: churu.online   # ← replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
