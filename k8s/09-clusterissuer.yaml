apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory  # Prod server (use staging for testing: https://acme-staging-v02.api.letsencrypt.org/directory)
    email: shivam@gmail.com  # Replace with your email (e.g., from your secrets: rajatsinghchuru@gmail.com)
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx  # Matches your ingress class