# This ConfigMap embeds the SQL schema so Postgres auto-initialises on first boot.
# kubectl create configmap postgres-init-schema \
#   --from-file=schema.sql=./db/schema.sql \
#   -n reasonable-store --dry-run=client -o yaml > k8s/04b-schema-configmap.yaml
#
# OR apply the file directly after creating the ConfigMap below:

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-schema
  namespace: reasonable-store
data:
  schema.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS categories (
      id          SERIAL PRIMARY KEY,
      name        VARCHAR(100) NOT NULL UNIQUE,
      slug        VARCHAR(100) NOT NULL UNIQUE,
      icon        VARCHAR(10)  NOT NULL DEFAULT '🛍️',
      description TEXT,
      color_class VARCHAR(10)  DEFAULT 'c1',
      created_at  TIMESTAMPTZ  DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS products (
      id             UUID         PRIMARY KEY DEFAULT uuid_generate_v4(),
      name           VARCHAR(200) NOT NULL,
      description    TEXT,
      price          NUMERIC(10,2) NOT NULL,
      original_price NUMERIC(10,2),
      category_id    INTEGER      REFERENCES categories(id) ON DELETE SET NULL,
      emoji          VARCHAR(10)  DEFAULT '📦',
      badge          VARCHAR(30),
      bg_color       VARCHAR(30)  DEFAULT '#f5ece0',
      stock          INTEGER      DEFAULT 100,
      is_featured    BOOLEAN      DEFAULT FALSE,
      created_at     TIMESTAMPTZ  DEFAULT NOW(),
      updated_at     TIMESTAMPTZ  DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS gallery_photos (
      id            UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      filename      VARCHAR(255) NOT NULL,
      original_name VARCHAR(255),
      url           TEXT NOT NULL,
      label         VARCHAR(200),
      is_featured   BOOLEAN DEFAULT FALSE,
      created_at    TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS customer_queries (
      id         UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      full_name  VARCHAR(200) NOT NULL,
      email      VARCHAR(200) NOT NULL,
      phone      VARCHAR(30),
      category   VARCHAR(100),
      message    TEXT NOT NULL,
      status     VARCHAR(30) DEFAULT 'new',
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS cart_items (
      id         UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      session_id VARCHAR(100) NOT NULL,
      product_id UUID REFERENCES products(id) ON DELETE CASCADE,
      quantity   INTEGER DEFAULT 1,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

